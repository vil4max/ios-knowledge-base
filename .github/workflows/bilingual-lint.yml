name: Bilingual lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-bilingual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run bilingual linter
        run: python3 scripts/lint_bilingual.py
